<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-label="Screenshot placeholder">
  <rect width="1280" height="720" fill="#eef2f7"/>
  <rect x="2" y="2" width="1276" height="716" fill="none" stroke="#cbd5e1" stroke-width="3" stroke-dasharray="14 10"/>
  <!-- simple chart glyph -->
  <g transform="translate(560,250)" fill="#94a3b8">
    <rect x="0"   y="120" width="28" height="80"  rx="4"/>
    <rect x="44"  y="80"  width="28" height="120" rx="4"/>
    <rect x="88"  y="40"  width="28" height="160" rx="4"/>
    <rect x="132" y="100" width="28" height="100" rx="4"/>
  </g>
  <text x="640" y="520" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif"
        font-size="34" font-weight="600" fill="#64748b">Dashboard screenshot</text>
  <text x="640" y="566" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif"
        font-size="24" fill="#94a3b8">Replace with a Power BI export (16:9)</text>
